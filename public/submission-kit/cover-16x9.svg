<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Database Optimization Tool directory cover</title>
  <desc id="desc">16 by 9 cover image for directory submissions, using the site's light grid, teal accents, and evidence-backed database audit positioning.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f9fb"/>
      <stop offset="0.56" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f6"/>
    </linearGradient>
    <linearGradient id="panel" x1="860" y1="170" x2="1420" y2="735" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f6"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#172027" stroke-opacity="0.045" stroke-width="2"/>
    </pattern>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#172027" flood-opacity="0.13"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#page)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="214" cy="108" r="260" fill="#087b84" opacity="0.14" filter="url(#soft)"/>
  <circle cx="1290" cy="160" r="210" fill="#159447" opacity="0.11" filter="url(#soft)"/>
  <circle cx="1184" cy="744" r="230" fill="#087b84" opacity="0.08" filter="url(#soft)"/>

  <g transform="translate(106 92)">
    <g transform="translate(0 6)">
      <path d="M36 0 65 11v26c0 19-10 33-29 45C17 70 7 56 7 37V11L36 0Z" fill="none" stroke="#172027" stroke-linecap="round" stroke-linejoin="round" stroke-width="7"/>
      <ellipse cx="36" cy="27" fill="none" rx="18" ry="8" stroke="#172027" stroke-width="6"/>
      <path d="M18 27v28c0 5 8 8 18 8s18-3 18-8V27" fill="none" stroke="#172027" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"/>
      <path d="M18 55c0 5 8 8 18 8s18-3 18-8" fill="none" stroke="#172027" stroke-width="6"/>
      <path d="M23 44h26" fill="none" stroke="#087b84" stroke-linecap="round" stroke-width="9"/>
    </g>
    <text x="92" y="52" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="34" font-weight="800">Database Optimization Tool</text>
  </g>

  <g transform="translate(112 238)">
    <rect x="0" y="0" width="388" height="40" rx="20" fill="#eef3f6" stroke="#d5dde3"/>
    <circle cx="28" cy="20" r="7" fill="#159447"/>
    <text x="50" y="27" fill="#5f6c76" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="2">READ-ONLY AUDIT PATH</text>
    <text x="0" y="136" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="76" font-weight="900">Evidence-backed</text>
    <text x="0" y="224" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="76" font-weight="900">database</text>
    <text x="0" y="312" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="76" font-weight="900">optimization</text>
    <text x="0" y="382" fill="#5f6c76" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="30" font-weight="600">Slow queries, index pressure, safe next steps.</text>
    <g transform="translate(0 442)">
      <rect width="194" height="54" rx="0" fill="#07545c"/>
      <text x="25" y="36" fill="#ffffff" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="20" font-weight="900">Audit scope</text>
      <rect x="216" width="250" height="54" rx="0" fill="#ffffff" stroke="#07545c"/>
      <text x="242" y="36" fill="#07545c" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="20" font-weight="900">PostgreSQL path</text>
    </g>
  </g>

  <g transform="translate(926 170)" filter="url(#shadow)">
    <rect width="590" height="560" rx="8" fill="url(#panel)" stroke="#d5dde3"/>
    <rect width="590" height="58" rx="8" fill="#172027"/>
    <circle cx="32" cy="29" r="8" fill="#bf3b3b"/>
    <circle cx="58" cy="29" r="8" fill="#c27408"/>
    <circle cx="84" cy="29" r="8" fill="#159447"/>
    <text x="120" y="37" fill="#f7f9fb" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, Menlo, monospace" font-size="18" font-weight="700">audit-report.sql</text>
    <g transform="translate(42 100)">
      <text x="0" y="0" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="30" font-weight="900">Optimization signals</text>
      <text x="0" y="42" fill="#5f6c76" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="20" font-weight="600">Human-reviewed findings from read-only evidence.</text>
      <g transform="translate(0 82)">
        <rect width="506" height="72" rx="6" fill="#ffffff" stroke="#d5dde3"/>
        <rect x="20" y="22" width="86" height="28" rx="14" fill="#fff4df" stroke="#c27408"/>
        <text x="41" y="43" fill="#8a5200" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, Menlo, monospace" font-size="13" font-weight="800">HIGH</text>
        <text x="128" y="43" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="22" font-weight="800">Slow query review</text>
        <path d="M360 47 C392 10 430 62 486 24" fill="none" stroke="#087b84" stroke-width="6" stroke-linecap="round"/>
      </g>
      <g transform="translate(0 174)">
        <rect width="506" height="72" rx="6" fill="#ffffff" stroke="#d5dde3"/>
        <rect x="20" y="22" width="112" height="28" rx="14" fill="#eef3f6" stroke="#2f5fbd"/>
        <text x="39" y="43" fill="#2f5fbd" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, Menlo, monospace" font-size="13" font-weight="800">MEDIUM</text>
        <text x="154" y="43" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="22" font-weight="800">Index pressure</text>
        <path d="M360 49 C402 48 426 24 486 30" fill="none" stroke="#159447" stroke-width="6" stroke-linecap="round"/>
      </g>
      <g transform="translate(0 266)">
        <rect width="506" height="72" rx="6" fill="#ffffff" stroke="#d5dde3"/>
        <rect x="20" y="22" width="76" height="28" rx="14" fill="#e9f7ee" stroke="#159447"/>
        <text x="42" y="43" fill="#0b6d31" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, Menlo, monospace" font-size="13" font-weight="800">OK</text>
        <text x="118" y="43" fill="#172027" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="22" font-weight="800">Safe next steps</text>
        <path d="M360 44 C392 38 420 42 486 18" fill="none" stroke="#087b84" stroke-width="6" stroke-linecap="round"/>
      </g>
      <g transform="translate(0 388)">
        <rect width="506" height="8" rx="4" fill="#d5dde3"/>
        <rect width="376" height="8" rx="4" fill="#087b84"/>
        <text x="0" y="44" fill="#5f6c76" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, Menlo, monospace" font-size="16" font-weight="700">scope confirmed -> evidence checklist -> review</text>
      </g>
    </g>
  </g>

  <path d="M752 722 C844 652 820 480 928 410" fill="none" stroke="#087b84" stroke-opacity="0.34" stroke-width="5"/>
  <path d="M768 752 C884 690 864 548 964 502" fill="none" stroke="#159447" stroke-opacity="0.34" stroke-width="5"/>
</svg>
