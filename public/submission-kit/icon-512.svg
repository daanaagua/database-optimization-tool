<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Database Optimization Tool square icon</title>
  <desc id="desc">Square icon derived from the site favicon: a protected database mark with teal performance signal.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#172027" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="tile" x1="72" y1="46" x2="440" y2="466" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3f6"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#172027" stroke-opacity="0.045" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="92" fill="#f7f9fb"/>
  <rect width="512" height="512" rx="92" fill="url(#grid)"/>
  <circle cx="120" cy="96" r="140" fill="#087b84" opacity="0.12"/>
  <circle cx="410" cy="122" r="118" fill="#159447" opacity="0.10"/>
  <rect x="90" y="78" width="332" height="356" rx="72" fill="url(#tile)" filter="url(#shadow)"/>
  <path d="M256 72 388 122v119c0 87-46 152-132 207-86-55-132-120-132-207V122L256 72Z" fill="none" stroke="#172027" stroke-linecap="round" stroke-linejoin="round" stroke-width="38"/>
  <ellipse cx="256" cy="195" fill="none" rx="82" ry="37" stroke="#172027" stroke-width="34"/>
  <path d="M174 195v130c0 21 37 38 82 38s82-17 82-38V195" fill="none" stroke="#172027" stroke-linecap="round" stroke-linejoin="round" stroke-width="34"/>
  <path d="M174 325c0 21 37 38 82 38s82-17 82-38" fill="none" stroke="#172027" stroke-width="34"/>
  <path d="M198 272h116" fill="none" stroke="#087b84" stroke-linecap="round" stroke-width="46"/>
</svg>
